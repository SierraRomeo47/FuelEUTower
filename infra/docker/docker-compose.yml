version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fueleu-postgres
    environment:
      POSTGRES_USER: fueleu_user
      POSTGRES_PASSWORD: fueleu_password
      POSTGRES_DB: fueleu_db
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fueleu-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: fueleu-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fueleu_db
      KC_DB_SCHEMA: public
      KC_DB_USERNAME: fueleu_user
      KC_DB_PASSWORD: fueleu_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: fueleu-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
